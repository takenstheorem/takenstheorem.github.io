<!DOCTYPE html>
<html lang="en">
<head>

<title>⚛️ Quantum ECDSA Cracker</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#070714;color:#cbd0e6;font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,'Liberation Mono','Courier New',monospace;overflow-x:hidden;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;text-rendering:geometricPrecision}
#bg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}
.wrap{position:relative;z-index:1;max-width:1150px;margin:0 auto;padding:18px}
h1{text-align:center;font-size:1.75em;color:#0fc;text-shadow:0 0 18px #0fc3;margin-bottom:4px;display:inline-block;letter-spacing:.02em}

.panel h2{font-size:.82em;color:#11baff;letter-spacing:2.2px;text-transform:uppercase;margin-bottom:6px;display:inline-block}

.c1{color:#0fc}.c2{color:#fc0}.c3{color:#f55}.c4{color:#4f4}
.ctrls{text-align:center;margin:14px 0;position:relative}
#go{background:linear-gradient(135deg,#0ff,#0a84ff);color:#041018;border:1px solid #0ff6;padding:12px 40px;font-size:1.05em;font-weight:800;font-family:inherit;border-radius:12px;cursor:pointer;letter-spacing:1.4px;text-transform:uppercase;box-shadow:0 10px 24px #0008,0 0 0 1px #0ff2;transition:transform .2s,box-shadow .2s,filter .2s}
#go:hover{transform:translateY(-1px);filter:saturate(1.08);box-shadow:0 14px 30px #000a,0 0 0 1px #0ff4}
#go:disabled{opacity:.4;cursor:default;transform:none}
#log{background:#070717;border:1px solid #232354;border-radius:10px;padding:10px 14px;max-height:200px;overflow-y:auto;font-size:.75em;line-height:1.9;position:relative;box-shadow:inset 0 1px 0 #ffffff08}
.ll{animation:fi .4s}
@keyframes fi{from{opacity:0;transform:translateX(-10px)}to{opacity:1}}
#res{text-align:center;margin:16px 0;padding:22px;background:linear-gradient(180deg,#10102a,#0b0b1c);border:1px solid #2b2b60;border-radius:12px;display:none;position:relative;box-shadow:0 14px 40px #000a}

@keyframes rv{0%{opacity:0;transform:scale(.85);border-color:#f44}50%{border-color:#fc0}100%{opacity:1;transform:scale(1);border-color:#4f4;box-shadow:0 0 40px #4f43}}

#help-card .hc-body{
  padding:16px 20px 20px;font-size:.88em;line-height:1.85;
  color:#b0b0d0;overflow-y:auto;
}
#help-card .hc-body b{color:#fc0}
#help-card .hc-body .analogy{
  background:rgba(0,170,255,.533);border-left:3px solid #0af;
  padding:8px 12px;margin:10px 0;border-radius:0 6px 6px 0;
  font-style:italic;color:#8ac;font-size:.92em;
}
#help-card .hc-body .real-world{
  background:rgba(255,85,85,.533);border-left:3px solid #f55;

}

@media(max-width:700px){.panels{flex-direction:column}h1{font-size:1.3em}#help-card{max-width:95%}}

<body>
<canvas id="bg"></canvas>

<!-- HELP OVERLAY -->
<div id="help-overlay" onclick="if(event.target===this)closeHelp()">
  <div id="help-card">
    <div class="hc-head">
      <span class="hc-icon" id="hcIcon">?</span>
      <span class="hc-title" id="hcTitle">Title</span>

</div>

<div class="wrap">
  <div class="title-row">
    <h1>⚛️ QUANTUM ECDSA CRACKER</h1>
    <span class="help-btn" onclick="showHelp('main')">?</span>
  </div>
  <p class="sub">Shor's Algorithm vs. Elliptic Curve Discrete Logarithm Problem</p>
  <div class="panels">
    <div class="panel">
      <h2>📐 Elliptic Curve E(𝔽<sub>p</sub>)</h2>
      <span class="help-btn" onclick="showHelp('curve')">?</span>
      <div class="cv-wrap">
        <canvas id="ecC" width="520" height="420"></canvas>
        <span class="help-btn on-canvas" style="top:6px;right:6px" onclick="showHelp('points')">?</span>
      </div>
      <div class="info" id="ecI">
        Curve not yet initialized.
        <span class="help-btn" onclick="showHelp('keys')" style="float:right">?</span>
      </div>
    </div>
    <div class="panel">
      <h2>🔮 Quantum Circuit</h2>
      <span class="help-btn" onclick="showHelp('circuit')">?</span>
      <div class="cv-wrap">
        <canvas id="qcC" width="520" height="420"></canvas>
        <span class="help-btn on-canvas" style="top:6px;left:6px" onclick="showHelp('qubits')">?</span>
        <span class="help-btn on-canvas" style="top:6px;right:6px" onclick="showHelp('gates')">?</span>

        <!-- Gate-specific helps positioned over canvas areas -->
        <span class="help-btn on-canvas" style="bottom:8px;left:22%" onclick="showHelp('hadamard')">?</span>
        <span class="help-btn on-canvas" style="bottom:8px;left:43%" onclick="showHelp('oracle')">?</span>
        <span class="help-btn on-canvas" style="bottom:8px;left:62%" onclick="showHelp('qft')">?</span>
        <span class="help-btn on-canvas" style="bottom:8px;left:82%" onclick="showHelp('measure')">?</span>
      </div>
      <div class="info" id="qcI">
        Quantum processor: <span class="c1">STANDBY</span>
        <span class="help-btn" onclick="showHelp('processor')" style="float:right">?</span>
      </div>
    </div>
  </div>
  <div class="ctrls">
    <button id="go" onclick="startAttack()">⚡ CRACK ECDSA ⚡</button>
    <span class="help-btn" onclick="showHelp('attack')" style="vertical-align:middle">?</span>
  </div>
  <div style="position:relative">
    <div id="log"></div>
    <span class="help-btn" style="position:absolute;top:8px;right:10px;z-index:2" onclick="showHelp('log')">?</span>
  </div>
  <div id="res">
    <span class="help-btn" style="position:absolute;top:10px;right:14px" onclick="showHelp('result')">?</span>
    <h2>🔓 PRIVATE KEY RECOVERED</h2>
    <p>Secret scalar <b>d</b> = <span class="big" id="resK"></span></p>
    <p class="verify" id="resV"></p>
  </div>
</div>

<script>
// ═══════════════════════════════════════
//  CURVE SETUP
// ═══════════════════════════════════════
const CP=97,CA=2,CB=3;

// ═══════════════════════════════════════
//  HELP CONTENT
// ═══════════════════════════════════════
const HELP = {
  main: {
    icon: '⚛️', title: 'What Is This Demo?',
    tags: ['Quantum Computing', 'Cryptography', 'ECDSA'],
    body: `
      This demo simulates a <b>quantum computer cracking ECDSA</b> — the same digital signature algorithm that secures <b>Bitcoin, Ethereum, and most of the internet</b>.
      <div class="analogy">🍕 Analogy: Imagine your crypto wallet has a lock (public key) and a secret combination (private key). This demo shows how a quantum computer could figure out the combination just by looking at the lock.</div>
      <b>ECDSA</b> (Elliptic Curve Digital Signature Algorithm) is considered unbreakable by normal computers because it relies on a math problem that's insanely hard to reverse. But <b>quantum computers</b> use physics tricks to solve it exponentially faster.
      <div class="real-world">⚠️ Real ECDSA uses huge numbers (256-bit). We use a tiny curve here so you can see it all happen visually. The math is identical — our curve is just a toy-sized version.</div>
    `
  },
  curve: {
    icon: '📐', title: 'What Is an Elliptic Curve?',
    tags: ['Math', 'Elliptic Curves', 'Finite Fields'],
    body: `
      An <b>elliptic curve</b> is a special type of equation: <b>y² = x³ + ax + b</b>.
      <br><br>When drawn on a normal graph, it looks like a smooth swooping line. But in cryptography we use it over a <b>finite field</b> — meaning we only allow whole numbers and wrap around at a prime number <b>p</b> (like clock arithmetic).
      <div class="analogy">🕐 Analogy: Imagine doing math on a clock — after 12 comes 1 again. We do the same thing but the "clock" has ${CP} hours (positions 0 to ${CP-1}). This makes the curve into a scattered set of dots instead of a smooth line.</div>
      The magic property: you can <b>"add" two points together</b> to get a third point, and this operation forms a <b>mathematical group</b> — meaning it follows nice rules that make cryptography possible.
      <div class="real-world">🔐 Bitcoin uses the curve <b>secp256k1</b>: y² = x³ + 7 over a 256-bit prime. Same concept, astronomically bigger numbers.</div>
    `
  },
  points: {
    icon: '✨', title: 'What Are These Dots?',
    tags: ['Curve Points', 'Finite Field', 'Group'],
    body: `
      Each glowing dot is a <b>point (x, y)</b> that satisfies our curve equation y² = x³ + ${CA}x + ${CB} (mod ${CP}).
      <br><br>We test every possible x from 0 to ${CP-1}, compute the right side, and check if any y value squared equals it (mod ${CP}). Only some (x,y) pairs work — those are our curve points.
      <div class="analogy">🎯 Analogy: Imagine throwing darts at a grid. Only the darts that land on specific magic spots "count." Those magic spots are our curve points.</div>
      <b>Green dot (G)</b> = the <b>Generator</b> — our agreed-upon starting point.<br>
      <b>Red dot (Q)</b> = the <b>Public Key</b> — where you end up after "walking" <b>d</b> steps from G.<br>
      <b>Yellow path</b> = the secret route from G to Q (the private key's trail).
      <div class="real-world">🌐 Everyone agrees on G publicly. The trick is that knowing G and Q, you can't figure out how many steps (d) it took to get there — unless you have a quantum computer!</div>
    `
  },
  keys: {
    icon: '🔑', title: 'Public Keys, Private Keys & Signatures',
    tags: ['ECDSA', 'Digital Signatures', 'Private Key'],
    body: `
      <b>Private key (d)</b>: A secret random number. This is what you must protect!
      <br><b>Public key (Q)</b>: Computed as Q = d × G (add G to itself d times). This is shared openly.
      <br><br>The <b>"Discrete Log Problem"</b>: Given G and Q, find d. On normal computers this is practically impossible for large curves.
      <div class="analogy">🏃 Analogy: Imagine running laps on a circular track. I tell you "I'm at position Q" and "each lap starts at G." How many laps did I run? With a huge track and huge number of laps, you can't tell — but a quantum computer can.</div>
      <b>ECDSA Signatures</b> use the private key to create a mathematical proof that you authored a message — without revealing the key. If someone steals your private key, they can <b>forge your signatures</b>, steal your crypto, impersonate you.
      <div class="real-world">💸 If a quantum computer recovers d from someone's public key, it can sign transactions and <b>drain their entire wallet</b>.</div>
    `
  },
  circuit: {
    icon: '🔮', title: 'What Is a Quantum Circuit?',
    tags: ['Quantum Computing', 'Circuits', 'Algorithms'],
    body: `
      A <b>quantum circuit</b> is a program for a quantum computer, shown as horizontal lines (wires) representing <b>qubits</b>, with boxes (gates) that perform operations on them.
      <br><br>You read it left to right: qubits start on the left, pass through gates, and are measured on the right.
      <div class="analogy">🎵 Analogy: Think of it like a music score — each line is an instrument (qubit), and the notes/symbols (gates) tell it what to do at each moment in time.</div>
      This circuit implements <b>Shor's Algorithm</b> adapted for elliptic curves. It's the specific quantum program that breaks ECDSA by solving the discrete log problem exponentially faster than any classical method.
      <div class="real-world">🖥️ Today's quantum computers (~1000 noisy qubits) are too small and error-prone to run this. Breaking real ECDSA would require ~2,300+ perfect logical qubits — estimated to be 5-20+ years away.</div>
    `
  },
  qubits: {
    icon: '🌀', title: 'What Are Qubits?',
    tags: ['Qubits', 'Superposition', 'Quantum Mechanics'],
    body: `
      A <b>qubit</b> (quantum bit) is the quantum version of a regular bit.
      <br><br>A normal bit is either <b>0</b> or <b>1</b>. A qubit can be in a <b>superposition</b> — it's 0 AND 1 at the same time until you look at it (measure it). This is written as |ψ⟩ = α|0⟩ + β|1⟩.
      <div class="analogy">🪙 Analogy: A classical bit is a coin lying heads or tails. A qubit is a coin <b>spinning in the air</b> — it's both heads and tails simultaneously. Only when it lands (measurement) does it commit to one.</div>
      We use <b>two registers</b> of qubits:
      <br>• <b>Register A</b> (top 3 wires): holds value "a"
      <br>• <b>Register B</b> (bottom 3 wires): holds value "b"
      <br><br>In superposition, they explore <b>ALL possible (a,b) combinations at once</b> — this is where quantum speedup comes from!
      <div class="real-world">🧪 Real qubits are made from superconducting loops (Google, IBM), trapped ions (IonQ), photons, or other quantum systems cooled to near absolute zero.</div>
    `
  },
  gates: {
    icon: '🔲', title: 'What Are Quantum Gates?',
    tags: ['Gates', 'H Gate', 'Operations'],
    body: `
      <b>Quantum gates</b> are operations that change the state of qubits — like logic gates (AND, OR, NOT) in a normal computer, but for quantum states.
      <br><br>The gates in our circuit:
      <br>• <b>H (Hadamard)</b> — Creates superposition
      <br>• <b>Uf (Oracle)</b> — Encodes the math problem
      <br>• <b>QFT† (Quantum Fourier Transform)</b> — Extracts the answer
      <br>• <b>📊 (Measurement)</b> — Reads the result
      <div class="analogy">🎛️ Analogy: Gates are like audio effects pedals for a guitar. Each one transforms the "signal" (quantum state) in a specific way. Chain them together and you get the sound (answer) you want.</div>
      Unlike classical gates, quantum gates are <b>reversible</b> (you can always undo them) and they work on superpositions — so one gate operation transforms ALL possible states simultaneously.
    `
  },
  hadamard: {
    icon: '🌊', title: 'H — Hadamard Gate (Superposition)',
    tags: ['Hadamard', 'Superposition', 'Parallelism'],
    body: `
      The <b>Hadamard gate (H)</b> puts a qubit into an <b>equal superposition</b> of 0 and 1:
      <br><br><b>|0⟩ → (|0⟩ + |1⟩) / √2</b>
      <br><br>When applied to ALL qubits, it creates a superposition of <b>every possible input combination</b> at once.
      <div class="analogy">🚪 Analogy: Imagine you're at a crossroads and you need to try every possible path. A normal computer walks down one path at a time. The Hadamard gate lets the quantum computer take <b>ALL paths simultaneously</b>.</div>
      With 6 qubits in superposition, we're exploring <b>2⁶ = 64 states at once</b>. In a real attack on secp256k1, you'd superpose over 2²⁵⁶ states — an astronomically huge number computed in parallel.
      <div class="real-world">⚡ This massive parallelism is why quantum computers threaten cryptography. One operation processes trillions of trillions of possibilities at once.</div>
    `
  },
  oracle: {
    icon: '🔮', title: 'Uf — Quantum Oracle (The Secret Sauce)',
    tags: ['Oracle', 'Point Multiplication', 'Entanglement'],
    body: `
      The <b>oracle (Uf)</b> is the heart of the attack. It computes:
      <br><br><b>f(a, b) = aG + bQ</b>
      <br><br>…for <b>ALL values of (a, b) simultaneously</b> thanks to superposition. It entangles the input registers with the result.
      <div class="analogy">📖 Analogy: Imagine a magic book where you ask "what's aG + bQ?" and it answers for every possible (a,b) at the same time, writing all answers in invisible ink that only the QFT can reveal.</div>
      The key insight: whenever <b>a + d·b ≡ 0 (mod n)</b>, the oracle outputs the <b>same point</b>. This creates a hidden pattern in the quantum state that encodes the secret key d.
      <br><br>A classical computer would need to try each (a,b) pair one at a time — taking forever for large curves. The quantum oracle does it in <b>one shot</b>.
      <div class="real-world">🧬 Building this oracle for real elliptic curves is the hardest engineering challenge. It requires reversible modular arithmetic circuits with thousands of qubits.</div>
    `
  },
  qft: {
    icon: '📊', title: 'QFT† — Quantum Fourier Transform',
    tags: ['QFT', 'Interference', 'Period Finding'],
    body: `
      The <b>Quantum Fourier Transform (QFT†)</b> is the thing that pulls the answer out of the noise. It converts the pattern left by the oracle into a measurable signal.
      <div class="analogy">🎵 Analogy: Imagine a room full of people humming different notes at once (superposition). The QFT is like a magical microphone that picks out the <b>one hidden melody</b> (the secret key) from the noise — through constructive and destructive interference.</div>
      <b>How it works</b>: The oracle created a periodic pattern in the quantum state. The QFT detects this period via <b>interference</b>:
      <br>• Wrong answers <b>cancel each other out</b> (destructive interference)
      <br>• The right answer <b>reinforces itself</b> (constructive interference)
      <br><br>After QFT, measuring the qubits will give values (a, b) that satisfy <b>a + d·b ≡ 0 (mod n)</b>, letting us solve for d.
      <div class="real-world">🌊 This is analogous to how noise-canceling headphones work — unwanted signals are made to cancel themselves while the desired signal passes through.</div>
    `
  },
  measure: {
    icon: '📏', title: 'Measurement — Collapsing the Qubits',
    tags: ['Measurement', 'Collapse', 'Classical Output'],
    body: `
      <b>Measurement</b> forces each qubit to "decide" — it goes from a superposition to a definite classical <b>0</b> or <b>1</b>. This is called <b>wavefunction collapse</b>.
      <div class="analogy">🪙 Analogy: Remember the spinning coin? Measurement is the coin landing. It was both heads and tails; now it's one or the other. You can't un-measure it!</div>
      After the QFT, the superposition has been sculpted so that measuring gives us values <b>(a, b)</b> where:
      <br><br><b>a + d·b ≡ 0 (mod n)</b>
      <br><br>We then solve this equation classically:
      <br><b>d = −a × b⁻¹ (mod n)</b>
      <br><br>And just like that, we've recovered the <b>private key</b>!
      <div class="real-world">🎰 There's some probability involved — you might need to run the circuit a few times to get a useful (a,b) pair. But on average it works quickly.</div>
    `
  },
  processor: {
    icon: '💻', title: 'The Quantum Processor Status',
    tags: ['Status', 'Phases', 'Pipeline'],
    body: `
      This status bar shows what <b>phase</b> the quantum computation is in:
      <br><br>
      <b>STANDBY</b> → Processor not yet started<br>
      <b>ACTIVE</b> → Circuit is running<br>
      <b>SUPERPOSITION</b> → Qubits in parallel states<br>
      <b>ORACLE</b> → Computing on the curve<br>
      <b>QFT</b> → Extracting the answer<br>
      <b>COLLAPSING</b> → Measuring the qubits<br>
      <b>COLLAPSED</b> → Classical result obtained
      <div class="analogy">🚦 Analogy: Like a traffic light showing the current phase of the computation pipeline. Each phase transforms the quantum state one step closer to revealing the secret key.</div>
    `
  },
  attack: {
    icon: '⚡', title: 'What Happens When I Click This?',
    tags: ['Shor\'s Algorithm', 'ECDLP', 'Full Attack'],
    body: `
      Clicking this button runs the <b>full quantum attack simulation</b>:
      <br><br>
      <b>Step 1</b> — Set up the elliptic curve and find all its points<br>
      <b>Step 2</b> — Pick a generator G and a secret key d, compute public key Q = dG<br>
      <b>Step 3</b> — Run Shor's Algorithm: H → Oracle → QFT → Measure<br>
      <b>Step 4</b> — Classical post-processing to extract d<br>
      <b>Step 5</b> — Verify: does d × G equal Q? If yes, key is cracked!
      <div class="analogy">🔓 Analogy: It's like watching a locksmith (quantum computer) pick a lock (ECDSA) by trying every possible combination simultaneously and then using physics-magic to make all the wrong combinations cancel out, leaving only the correct one.</div>
      <div class="real-world">⏱️ Our demo curve takes seconds. Real ECDSA (secp256k1) would take a sufficiently large quantum computer perhaps hours. No such computer exists yet — but researchers are racing to build one.</div>

const mod=(a,m)=>((a%m)+m)%m;
function modPow(base,exp,m){let r=1;base=mod(base,m);while(exp>0){if(exp&1)r=mod(r*base,m);exp>>=1;base=mod(base*base,m);}return r;}
const modInv=(a,m)=>modPow(a,m-2,m);

// ═══════════════════════════════════════
//  ELLIPTIC CURVE ARITHMETIC
// ═══════════════════════════════════════
function ecAdd(P,Q,a,p){
  if(!P)return Q;if(!Q)return P;
  const[x1,y1]=P,[x2,y2]=Q;
  if(x1===x2&&y1!==y2)return null;
  let lam;
  if(x1===x2&&y1===y2){if(y1===0)return null;lam=mod((3*x1*x1+a)*modInv(2*y1,p),p);}
  else{lam=mod((y2-y1)*modInv(mod(x2-x1,p),p),p);}
  const x3=mod(lam*lam-x1-x2,p),y3=mod(lam*(x1-x3)-y1,p);
  return[x3,y3];
}
function ecMul(k,P,a,p){let R=null,Q=[...P];while(k>0){if(k&1)R=ecAdd(R,Q,a,p);Q=ecAdd(Q,Q,a,p);k>>=1;}return R;}
function findPoints(a,b,p){const pts=[];for(let x=0;x<p;x++){const rhs=mod(x*x*x+a*x+b,p);for(let y=0;y<p;y++)if(mod(y*y,p)===rhs)pts.push([x,y]);}return pts;}
function pointOrder(P,a,p){let Q=P;for(let i=2;i<=300;i++){Q=ecAdd(Q,P,a,p);if(!Q)return i;}return-1;}

const Q=ecMul(secretD,G,CA,CP);

  log('','`&nbsp;&nbsp;b⁻¹ mod ${ord} = ${bInv}`','c2');await delay(600);
  log('','`&nbsp;&nbsp;d = −${measA} × ${bInv} mod ${ord} = <b>${recovered}</b>`','c2');await delay(1000);
  const verify=ecMul(recovered,G,CA,CP);
  const ok=verify&&verify[0]===Q[0]&&verify[1]===Q[1];
  log('✅',`Verification: ${recovered} × G = (${verify?verify[0]:'?'}, ${verify?verify[1]:'?'}) ${ok?'= Q ✓':'≠ Q ✗'}`,'c4');
  S.phase='done';S.showPath=true;await animateTo('pathProg',1,2000);
  document.getElementById('ecI').innerHTML=
    `Curve: <span class="c1">y² = x³ + ${CA}x + ${CB} (mod ${CP})</span><br>`+
    `Generator: <span class="c4">G = (${G[0]}, ${G[1]})</span>, ord = ${ord}<br>`+
    `Public key: <span class="c3">Q = (${Q[0]}, ${Q[1]})</span><br>`+
    `<b>Secret key: <span class="c3">d = ${recovered}</span> 🔓</b>`+
    `<span class="help-btn" onclick="showHelp('keys')" style="float:right">?</span>`;
  document.getElementById('resK').textContent=recovered;
  document.getElementById('resV').innerHTML=
    `Verified: <b>${recovered}</b> × G(${G[0]},${G[1]}) = Q(${Q[0]},${Q[1]}) ✓<br>`+
    `<span style="color:#889;font-size:.85em">A real quantum computer would break secp256k1 the same way — just with ~2330 logical qubits.</span>`;
  document.getElementById('res').classList.add('show');
  await delay(1500);
  log('💀','<b>ECDSA private key fully compromised by quantum attack.</b>','c3');
  log('🛡️','Migrate to post-quantum cryptography (CRYSTALS-Dilithium, SPHINCS+, etc.)','c4');
}
